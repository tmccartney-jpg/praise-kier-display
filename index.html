    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      font-family: 'ManifoldCF', 'Courier New', monospace;
      font-weight: bold;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }
    .screen {
      width: 100%;
      height: 100vh;
      height: -webkit-fill-available;
      background: #060606;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: calc(env(safe-area-inset-top) + 2.5rem) 2rem calc(env(safe-area-inset-bottom) + 2rem);
      position: relative;
      overflow: hidden;
      text-align: center;
    }
    .scanlines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.013) 3px, rgba(255,255,255,0.013) 4px);
      pointer-events: none; z-index: 0;
    }
    .top { position: relative; z-index: 1; width: 100%; display: flex; justify-content: space-between; align-items: flex-start; }
    .logo { font-family: 'ManifoldCF', monospace; font-weight: bold; font-size: 10px; letter-spacing: 0.3em; color: #333; text-transform: uppercase; line-height: 1.6; text-align: left; }
    .date { font-family: 'ManifoldCF', monospace; font-weight: bold; font-size: 10px; letter-spacing: 0.12em; color: #333; text-align: right; line-height: 1.6; }
    .middle {
      position: relative; z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 1.5rem 0;
      text-align: center;
    }
    .badge { font-family: 'ManifoldCF', monospace; font-weight: bold; display: inline-block; font-size: 9px; letter-spacing: 0.3em; color: #4a7a3a; border: 0.5px solid #2a4a1a; padding: 3px 12px; border-radius: 2px; margin-bottom: 1.4rem; text-transform: uppercase; }
    .msg-type { font-family: 'ManifoldCF', monospace; font-weight: bold; font-size: 10px; letter-spacing: 0.35em; color: #3a6a4a; text-transform: uppercase; margin-bottom: 1.4rem; }
    .message { font-family: 'ManifoldCF', monospace; font-weight: bold; font-size: clamp(28px, 8vw, 42px); color: #bde0bd; letter-spacing: 0.07em; line-height: 1.4; text-transform: uppercase; text-align: center; }
    .bottom { position: relative; z-index: 1; width: 100%; }
    .divider { border: none; border-top: 0.5px solid #181818; margin-bottom: 1.25rem; }
    .footer { display: flex; justify-content: space-between; align-items: center; }
    .praise { font-family: 'ManifoldCF', monospace; font-weight: bold; font-size: 9px; letter-spacing: 0.3em; color: #253525; text-transform: uppercase; }
    .indicator { width: 7px; height: 7px; border-radius: 50%; background: #2d6a2d; animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="screen">
    <div class="scanlines"></div>
    <div class="top">
      <div class="logo">Lumon<br>Industries</div>
      <div class="date" id="date-out">—</div>
    </div>
    <div class="middle">
      <div id="badge-area"></div>
      <div class="msg-type" id="msg-type">DAILY DIRECTIVE</div>
      <div class="message" id="main-msg">RETRIEVING DIRECTIVE…</div>
    </div>
    <div class="bottom">
      <hr class="divider" />
      <div class="footer">
        <span class="praise">Praise Kier</span>
        <div class="indicator"></div>
      </div>
    </div>
  </div>
  <script>
    const DIRECTIVES_URL = 'directives.json';
    const SCHEDULE_URL   = 'schedule.json';

    function getDayOfYear(d) {
      const start = new Date(d.getFullYear(), 0, 1);
      return Math.floor((d - start) / 86400000) + 1;
    }

    function getDeterministicIndex(year, month, dayOfYear, count) {
      if (count === 0) return 0;
      const monthlyOffset = (year * 37) + (month * 11);
      const zeroBasedDay = dayOfYear > 0 ? dayOfYear - 1 : 0;
      return (zeroBasedDay + monthlyOffset) % count;
    }

    function dayOfWeek(year, month, day) {
      const t = [0,3,2,5,0,3,5,1,4,6,2,4];
      if (month < 3) year -= 1;
      return (year + Math.floor(year/4) - Math.floor(year/100) + Math.floor(year/400) + t[month-1] + day) % 7;
    }

    function daysInMonth(year, month) {
      const days = [31,28,31,30,31,30,31,31,30,31,30,31];
      if (month === 2) {
        const leap = ((year%4===0)&&(year%100!==0))||(year%400===0);
        return leap ? 29 : 28;
      }
      return days[month-1];
    }

    function eventMatches(ev, year, month, day) {
      if (ev.month !== month) return false;
      if (ev.type === 'fixed') return ev.day === day;
      if (ev.type === 'nth_weekday') {
        if (dayOfWeek(year, month, day) !== ev.weekday) return false;
        return Math.floor((day-1)/7)+1 === ev.nth;
      }
      if (ev.type === 'last_weekday') {
        return dayOfWeek(year, month, day) === ev.weekday && (day + 7 > daysInMonth(year, month));
      }
      return false;
    }

    function setMessage(type, text) {
      document.getElementById('msg-type').textContent = type;
      document.getElementById('main-msg').textContent = text;
    }

    async function loadMessage() {
      try {
        const [dRes, sRes] = await Promise.all([
          fetch(DIRECTIVES_URL+'?t='+Date.now()),
          fetch(SCHEDULE_URL+'?t='+Date.now())
        ]);
        const dirData = await dRes.json();
        const schData = await sRes.json();

        const now = new Date();
        const month = now.getMonth()+1, day = now.getDate(), year = now.getFullYear();
        const doy = getDayOfYear(now);
        const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
        const DAYS = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
        document.getElementById('date-out').innerHTML = DAYS[now.getDay()]+'<br>'+day+' '+MONTHS[now.getMonth()]+' '+year;

        if (dirData.override_message && dirData.override_message.trim()) {
          setMessage('OVERRIDE MESSAGE', dirData.override_message.toUpperCase());
          return;
        }

        const activeShow = schData.shows.find(s=>s.id===schData.active_show&&s.enabled);
        if (activeShow) {
          const ws=new Date(activeShow.window_start), we=new Date(activeShow.window_end), ed=new Date(activeShow.event_time);
          const cs=new Date(ed.getTime()-(activeShow.start_hours_before||72)*3600000);
          if (now>=cs&&now<ed) {
            const h=Math.floor((ed-now)/3600000);
            let m=activeShow.countdown_messages[4];
            if(h>=48)m=activeShow.countdown_messages[0];
            else if(h>=24)m=activeShow.countdown_messages[1];
            else if(h>=1)m=activeShow.countdown_messages[2];
            else m=activeShow.countdown_messages[3];
            setMessage('COUNTDOWN', m); return;
          }
          if (now>=ed&&now.toDateString()===ed.toDateString()) {
            setMessage('EVENT DAY', activeShow.event_day_message); return;
          }
          if (now>=ws&&now<=we) {
            setMessage('SEASONAL MESSAGE', activeShow.messages[getDeterministicIndex(year, month, doy, activeShow.messages.length)]);
            return;
          }
        }

        for (const ev of dirData.annual_events) {
          if (eventMatches(ev, year, month, day)) {
            document.getElementById('badge-area').innerHTML='<span class="badge">ANNUAL OBSERVANCE</span><br>';
            setMessage('SPECIAL DIRECTIVE', ev.message);
            return;
          }
        }

        const idx = getDeterministicIndex(year, month, doy, dirData.directives.length);
        setMessage('DAILY DIRECTIVE', dirData.directives[idx].toUpperCase());

      } catch(e) { setMessage('SYSTEM', 'DIRECTIVE UNAVAILABLE — REMAIN CALM'); }
    }

    loadMessage();
    document.querySelector('.screen').addEventListener('click', () => {
      document.getElementById('main-msg').textContent = 'RETRIEVING…';
      document.getElementById('badge-area').innerHTML = '';
      loadMessage();
    });
  </script>
</body>
